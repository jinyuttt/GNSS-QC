# ============================================================
# GNSS-QC 影子评测服务配置
# ============================================================

# 服务配置
server:
  host: "0.0.0.0"
  port: 8500
  debug: false

# ============================================================
# 评测与修正配置
# ============================================================
eval:
  mode: true                    # 固定开启影子评测模式
  confidence_threshold: 0.7     # 生成修正值置信度阈值
  max_continuous_err: 20        # 超长异常区间不生成修正值

# ============================================================
# 初始默认模型路径
# ============================================================
model:
  init_rrcf: "./model_store/rrcf_default"
  init_lstm: "./model_store/lstm_default.pth"
  norm_file: "./model_store/norm.params"
  snapshot_dir: "./model_store/snapshot"

# ============================================================
# 定时训练任务
# ============================================================
train_task:
  interval_min: 60             # 训练间隔（分钟，600=10小时）
  max_fetch_num: 10000          # 单次最大拉取数据量

# ============================================================
# 模型迭代 & 热加载
# ============================================================
model_update:
  trigger_sample: 5000          # 累计样本数触发新版本
  trigger_round: 6              # 任务轮次触发新版本
  hot_reload_mode: "poll"       # poll / instant
  poll_interval_s: 60           # 轮询间隔（秒）
  keep_versions: 15             # 历史版本保留数量
  auto_rollback: true           # 自动回滚
  error_threshold: 0.15         # 异常指标阈值，触发自动回滚

# ============================================================
# LSTM+Attention模型参数
# ============================================================
lstm:
  input_size: 10                # 10维特征输入
  hidden_size: 64
  num_layers: 2
  attention_heads: 4
  dropout: 0.2
  window_size: 20               # 时序窗口大小
  output_classes: 3             # 正常/伪形变/真实形变

# ============================================================
# RRCF模型参数
# ============================================================
rrcf:
  num_trees: 100
  tree_size: 256
  shingle_size: 4

# ============================================================
# 存储配置
# ============================================================
storage:
  # type 支持三种写法:
  #   1. 内置快捷名: "sqlite"
  #   2. 自定义实现: "ai_service.storage.redis_store.RedisStore"
  #   3. 第三方包:   "my_package.timeseries_store.TimeseriesStore"
  # 加载失败自动 fallback 到 SQLite
  type: "tdengine"
  sqlite:
    db_path: "./data/shadow_eval.db"
    hot_ttl_days: 3             # 热数据保留天数
    full_ttl_days: 30           # 全量数据保留天数
  # 以下为自定义实现的配置示例，按需启用
  # redis:
  #   host: "localhost"
  #   port: 6379
  #   db: 0
  # mysql:
  #   host: "localhost"
  #   port: 3306
  #   user: "root"
  #   password: ""
  #   database: "gnss_shadow"

# ============================================================
# 日志配置
# ============================================================
logging:
  level: "INFO"
  file: "./data/shadow_eval.log"
  rotation: "50 MB"
  retention: "30 days"